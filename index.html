<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Life Game</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="toolbar" aria-label="操作パネル">
        <div class="title">
          <h1>Life Game</h1>
          <p>Conway's Game of Life</p>
        </div>

        <div class="controls">
          <button id="toggleRun" class="primary" type="button">再生</button>
          <button id="step" type="button">1ステップ</button>
          <button id="randomize" type="button">ランダム</button>
          <button id="clear" type="button">クリア</button>
        </div>

        <div class="sliders">
          <label>
            速度
            <input id="speed" type="range" min="40" max="500" value="130" step="10">
          </label>
          <label>
            密度
            <input id="density" type="range" min="5" max="70" value="28" step="1">
          </label>
        </div>

        <div class="stats" aria-live="polite">
          <span>世代 <strong id="generation">0</strong></span>
          <span>生存 <strong id="alive">0</strong></span>
        </div>
      </header>

      <section class="board-wrap" aria-label="ライフゲーム盤面">
        <canvas id="board" width="960" height="640"></canvas>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
